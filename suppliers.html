<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>공급처 정보 관리 — MD Squad</title>
<style>
  * { box-sizing: border-box; }
  html { overflow-y: scroll; }
  body { font-family: 'Segoe UI', -apple-system, "Malgun Gothic", sans-serif; background: #f0f2f5; color: #1f2937; margin: 0; }

  /* ===== 공통 헤더 (consultation.html과 동일 양식) ===== */
  .sticky-top { position: sticky; top: 0; z-index: 100; }
  .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 20px; font-weight: 600; margin: 0; }
  .header .sync { font-size: 12px; color: #9aa7b8; }

  /* 툴바 */
  .toolbar { background: #fff; border-bottom: 1px solid #e5e9f0; padding: 11px 30px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .editor-wrap { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: #64748b; font-weight: 600; }
  .editor-sel { padding: 6px 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 13px; background: #fff; color: #1e293b; font-family: inherit; }
  .editor-sel.warn { border-color: #f87171; }
  .editor-sel:disabled { background: #f1f5f9; color: #334155; }
  .btn { border: 0; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; }
  .btn-primary { background: #1a73e8; color: #fff; } .btn-primary:hover { background: #1557b0; }
  .btn-light { background: #eef2f7; color: #334155; } .btn-light:hover { background: #e2e8f0; }
  .btn-danger { background: #ef4444; color: #fff; } .btn-danger:hover { background: #dc2626; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .search { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 13px; min-width: 250px; font-family: inherit; }
  .search:focus { outline: none; border-color: #1a73e8; }
  .sel { padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 13px; background: #fff; font-family: inherit; }
  .sel:focus { outline: none; border-color: #1a73e8; }
  .flabel { font-size: 12.5px; font-weight: 600; color: #64748b; }
  .count-pill { font-size: 12.5px; color: #475569; background: #f1f5f9; padding: 6px 12px; border-radius: 999px; font-weight: 600; }

  /* 작성자 안내 배너 */
  .banner { display: none; align-items: center; gap: 8px; background: #fef3c7; color: #92400e; padding: 10px 30px; font-size: 13px; font-weight: 600; border-bottom: 1px solid #fde68a; }
  .banner.show { display: flex; }
  .banner span.sub { font-weight: 400; color: #a16207; }

  /* 본문 */
  .container { max-width: 1400px; margin: 0 auto; padding: 20px 30px 80px; }

  .card { background: #fff; border: 1px solid #e5e9f0; border-radius: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.05); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; table-layout: fixed; }
  thead th { background: #f8fafc; color: #64748b; font-weight: 600; font-size: 12px; text-align: left; padding: 0 10px; height: 34px; border-bottom: 1px solid #e5e9f0; white-space: nowrap; }
  thead th.center { text-align: center; }
  tbody td { padding: 0 10px; height: 34px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; overflow: hidden; }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr:hover { background: #f8fafc; }
  tbody tr.sel { background: #eaf2fb; }
  .cell { width: 100%; height: 28px; border: 1px solid transparent; background: transparent; padding: 0 8px; font-size: 13px; border-radius: 7px; font-family: inherit; color: #1e293b; transition: border-color .12s, box-shadow .12s, background .12s; }
  .cell:hover { border-color: #e2e8f0; }
  .cell:focus { outline: none; border-color: #1a73e8; background: #fff; box-shadow: 0 0 0 3px rgba(26,115,232,.12); }
  .cell:disabled { color: #94a3b8; cursor: not-allowed; background: transparent !important; }
  .cell.name { font-weight: 600; }
  .cell.demo { font-weight: 600; text-align: center; border-radius: 999px; min-width: 72px; color: #94a3b8; }
  .cell.demo.v가능 { background: #dcfce7; color: #15803d; }
  .cell.demo.v조건부 { background: #fef9c3; color: #a16207; }
  .cell.demo.v불가 { background: #fee2e2; color: #b91c1c; }
  .col-hist { text-align: center; }
  .btn-hist { background: #eef2ff; color: #4f46e5; border: 0; border-radius: 7px; padding: 3px 9px; font-size: 11.5px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .btn-hist:hover { background: #e0e7ff; }
  .btn-hist.empty { background: #f1f5f9; color: #94a3b8; }
  .empty { text-align: center; color: #98a2b3; padding: 48px 0; font-size: 14px; }

  /* 모달 */
  .modal-bg { position: fixed; inset: 0; background: rgba(15,23,42,.5); display: none; align-items: flex-start; justify-content: center; z-index: 200; padding: 40px 14px; overflow: auto; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 560px; padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,.25); }
  .modal h2 { margin: 0 0 4px; font-size: 18px; }
  .modal .sub { font-size: 12.5px; color: #94a3b8; margin-bottom: 14px; }
  .modal label { display: block; font-size: 12.5px; font-weight: 600; color: #475569; margin: 10px 0 4px; }
  .modal input, .modal select, .modal textarea { width: 100%; padding: 9px 11px; border: 1px solid #cbd5e1; border-radius: 9px; font-size: 13.5px; font-family: inherit; }
  .modal input:focus, .modal select:focus, .modal textarea:focus { outline: none; border-color: #1a73e8; }
  .modal textarea { min-height: 64px; resize: vertical; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .hint { font-size: 11.5px; color: #94a3b8; font-weight: 400; }
  .hist-list { max-height: 420px; overflow: auto; margin-top: 6px; }
  .hist-item { padding: 10px 2px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
  .hist-item:last-child { border-bottom: 0; }
  .hist-item .top { color: #64748b; font-size: 11.5px; margin-bottom: 3px; }
  .hist-item .field { font-weight: 600; color: #1e293b; }
  .chg-from { color: #dc2626; } .chg-arrow { color: #94a3b8; } .chg-to { color: #0d9488; font-weight: 600; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #fff; padding: 11px 18px; border-radius: 10px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity .25s; pointer-events: none; }
  .toast.show { opacity: 1; }
  @media (max-width: 768px) {
    .header { padding: 12px 16px; } .header h1 { font-size: 17px; }
    .toolbar { padding: 10px 16px; } .container { padding: 16px; }
    .search { min-width: 140px; }
  }
</style>
</head>
<body>

<!-- ===== STICKY TOP ===== -->
<div class="sticky-top">
  <div class="header">
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="home.html" style="color:#fff;text-decoration:none;font-size:18px;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,.1);display:flex;align-items:center;" title="홈으로">&#8962;</a>
      <h1>공급처 정보 관리</h1>
      <span class="sync" id="syncInfo">불러오는 중…</span>
    </div>
  </div>
  <div class="toolbar">
    <div class="editor-wrap">작성자<select class="editor-sel" id="editorSel" onchange="setEditor(this.value)" title="이력에 기록될 작성자"></select></div>
    <input class="search" id="fSearch" oninput="render()" placeholder="🔍 공급처 · 담당자 · 제품 · 프로모션 검색">
    <span class="flabel">데모가능</span>
    <select class="sel" id="fDemo" onchange="render()"><option value="">전체</option><option>가능</option><option>조건부</option><option>불가</option></select>
    <span class="flabel">프로모션</span>
    <select class="sel" id="fPromo" onchange="render()"><option value="">전체</option><option value="Y">진행중</option><option value="N">없음</option></select>
    <span class="count-pill" id="countPill">0곳</span>
    <button class="btn btn-light" onclick="refresh(true)">↻ 새로고침</button>
    <button class="btn btn-danger" id="btnDel" onclick="bulkDelete()" disabled>선택 삭제 (0)</button>
    <button class="btn btn-primary" style="margin-left:auto" onclick="openManual()">＋ 공급처 추가</button>
  </div>
  <div class="banner" id="editorBanner">✏️ 편집하려면 먼저 위에서 <b>작성자</b>를 선택하세요. <span class="sub">(한번 선택하면 변경할 수 없습니다)</span></div>
</div>

<div class="container">
  <div class="card">
    <table>
      <colgroup>
        <col style="width:34px"><col style="width:9%"><col style="width:74px"><col style="width:11%">
        <col style="width:11%"><col style="width:8%"><col style="width:8%"><col style="width:7%">
        <col style="width:8%"><col style="width:9%"><col style="width:11%"><col style="width:9%">
        <col style="width:9%"><col style="width:52px">
      </colgroup>
      <thead>
        <tr>
          <th><input type="checkbox" id="chkAll" onclick="toggleAll(this)"></th>
          <th>공급처명</th><th>데모가능</th><th>데모조건</th>
          <th>프로모션</th><th>할인율/조건</th><th>프로모션기간</th>
          <th>담당자명</th><th>연락처</th><th>이메일</th>
          <th>취급제품</th><th>공급제한</th><th>비고</th><th class="center">이력</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="empty" id="empty" style="display:none">데이터가 없습니다. 우측 상단 “공급처 추가”로 등록하세요.</div>
</div>

<!-- 공급처 추가 모달 -->
<div class="modal-bg" id="manualBg">
  <div class="modal">
    <h2>공급처 추가</h2>
    <div class="sub">공급처명만 입력해도 됩니다. 나머지는 표에서 바로 편집할 수 있어요.</div>
    <div class="grid2">
      <div><label>공급처명 *</label><input id="m_supplierName"></div>
      <div><label>데모가능</label><select id="m_demoAvailable"><option value=""></option><option>가능</option><option>조건부</option><option>불가</option></select></div>
    </div>
    <label>데모조건 <span class="hint">(데모기 보유, 회수기간 등)</span></label>
    <input id="m_demoCondition">
    <div class="grid2">
      <div><label>프로모션</label><input id="m_promotion"></div>
      <div><label>할인율/조건</label><input id="m_discount"></div>
      <div><label>프로모션기간</label><input id="m_promoPeriod" placeholder="예: 2026-06 ~ 07"></div>
      <div><label>담당자명</label><input id="m_managerName"></div>
      <div><label>담당자 연락처</label><input id="m_managerPhone" placeholder="010-0000-0000"></div>
      <div><label>담당자 이메일</label><input id="m_managerEmail"></div>
    </div>
    <label>취급제품</label>
    <input id="m_products">
    <label>공급제한 <span class="hint">(지역 대리점 제한·독점 등)</span></label>
    <input id="m_supplyLimit">
    <label>비고</label>
    <textarea id="m_remarks"></textarea>
    <div class="modal-foot">
      <button class="btn btn-light" onclick="closeModal('manualBg')">취소</button>
      <button class="btn btn-primary" id="m_save" onclick="saveManual()">등록</button>
    </div>
  </div>
</div>

<!-- 공급처별 이력 팝업 -->
<div class="modal-bg" id="histBg">
  <div class="modal" style="max-width:520px">
    <h2 id="histTitle">변경 이력</h2>
    <div class="sub" id="histSub"></div>
    <div class="hist-list" id="histList"></div>
    <div class="modal-foot">
      <button class="btn btn-light" onclick="closeModal('histBg')">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SHEET_ID = '1kK6YcXGQ87Fep5i1d__YPI7PLuLeUiLat2lX0Mh21hM';
const SHEET_TAB = '시트1';
const HIST_TAB = '변경이력';
const csvUrl = (tab) => 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(tab);
const WEBHOOK_URL = 'https://n8n.datastream.co.kr/webhook/supplier-crud';

const FIELD_TO_COL = {
  id: 'id', createdAt: '생성일', updatedAt: '수정일',
  supplierName: '공급처명', demoAvailable: '데모가능', demoCondition: '데모조건',
  promotion: '프로모션', discount: '할인율/조건', promoPeriod: '프로모션기간',
  managerName: '담당자명', managerPhone: '담당자연락처', managerEmail: '담당자이메일',
  products: '취급제품', supplyLimit: '공급제한', remarks: '비고'
};
const COL_TO_FIELD = Object.fromEntries(Object.entries(FIELD_TO_COL).map(kv => [kv[1], kv[0]]));

const CALLER_OPTIONS = ['박연지','주봉현','김태호','조성갑','유승준','박원','이예림','김진석','류창희'];
const EDITOR_KEY = 'md_suppliers_editor';

let ROWS = [];
let HISTORY = [];
const selected = new Set();
let pollTimer = null;

function nowStamp() { return new Date().toISOString().slice(0,16).replace('T',' '); }
function genId() { return 's_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function getEditor() { return localStorage.getItem(EDITOR_KEY) || ''; }
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ============================================================
// 시트 읽기 (gviz CSV)
// ============================================================
function parseCSV(text) {
  const rows = []; let i=0, cur='', row=[], inQ=false; const len=text.length;
  while (i < len) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"' && text[i+1] === '"') { cur+='"'; i+=2; continue; }
      if (ch === '"') { inQ=false; i++; continue; }
      cur+=ch; i++;
    } else {
      if (ch === '"') { inQ=true; i++; continue; }
      if (ch === ',') { row.push(cur); cur=''; i++; continue; }
      if (ch === '\n') { row.push(cur); rows.push(row); row=[]; cur=''; i++; continue; }
      if (ch === '\r') { i++; continue; }
      cur+=ch; i++;
    }
  }
  if (cur !== '' || row.length) { row.push(cur); rows.push(row); }
  if (!rows.length) return [];
  const headers = rows[0];
  return rows.slice(1).filter(r => r.some(c => c && c.trim()))
    .map(r => { const o={}; headers.forEach((h,idx)=>{ o[h]=r[idx]||''; }); return o; });
}
function sheetRowToRecord(row) {
  const r = {};
  Object.keys(COL_TO_FIELD).forEach(col => { r[COL_TO_FIELD[col]] = row[col] || ''; });
  return r;
}
function fetchSheet() {
  return fetch(csvUrl(SHEET_TAB) + '&_t=' + Date.now(), { cache: 'no-store' })
    .then(res => { if (!res.ok) throw new Error('HTTP '+res.status); return res.text(); })
    .then(csv => parseCSV(csv).map(sheetRowToRecord).filter(r => r.id))
    .catch(e => { console.warn('시트 조회 실패:', e); throw e; });
}
function fetchHistory() {
  return fetch(csvUrl(HIST_TAB) + '&_t=' + Date.now(), { cache: 'no-store' })
    .then(res => { if (!res.ok) throw new Error('HTTP '+res.status); return res.text(); })
    .then(csv => { const recs = parseCSV(csv).filter(r => r['시각']); recs.reverse(); HISTORY = recs; })
    .catch(e => { console.warn('이력 조회 실패:', e); });
}

// ============================================================
// 시트 쓰기 (n8n webhook)
// ============================================================
function recordToSheetData(r) {
  const d = {};
  Object.keys(FIELD_TO_COL).forEach(f => { if (r[f] !== undefined) d[FIELD_TO_COL[f]] = r[f] != null ? String(r[f]) : ''; });
  return d;
}
function callWebhook(action, payload) {
  return fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(Object.assign({ action }, payload))
  }).then(res => { if (!res.ok) throw new Error('webhook '+res.status); return res.json(); });
}
function syncCreate(r) { return callWebhook('create', { data: recordToSheetData(r) }); }
function syncUpdate(r) { return callWebhook('update', { data: recordToSheetData(r) }); }
function syncDelete(id) { return callWebhook('delete', { id }); }

// ============================================================
// 작성자 (미선택 시 편집 차단 · 선택 후 잠금)
// ============================================================
function editorLocked() { return !!getEditor(); }
function initEditorSel() {
  const sel = document.getElementById('editorSel');
  const cur = getEditor();
  if (cur) {
    sel.innerHTML = `<option selected>${esc(cur)}</option>`;
    sel.disabled = true; sel.classList.remove('warn');
    sel.title = '작성자 확정됨 — 변경 불가';
  } else {
    sel.disabled = false; sel.classList.add('warn');
    sel.innerHTML = '<option value="">(작성자 선택)</option>' + CALLER_OPTIONS.map(n=>`<option>${esc(n)}</option>`).join('');
    sel.title = '편집하려면 작성자를 먼저 선택하세요';
  }
  document.getElementById('editorBanner').classList.toggle('show', !cur);
}
function setEditor(v) {
  if (!v) return;
  if (!confirm(`작성자를 '${v}'(으)로 확정합니다.\n확정 후에는 변경할 수 없습니다. 계속할까요?`)) { initEditorSel(); return; }
  localStorage.setItem(EDITOR_KEY, v);
  initEditorSel(); render();
  toast(`작성자: ${v} — 이제 편집할 수 있어요`);
}

// ============================================================
// 렌더링
// ============================================================
const DEMO_OPTS = ['', '가능', '조건부', '불가'];

function optionsHtml(opts, val) {
  return opts.map(o => `<option value="${esc(o)}"${o===(val||'')?' selected':''}>${esc(o||'-')}</option>`).join('');
}

function applyFilters() {
  const q = document.getElementById('fSearch').value.trim().toLowerCase();
  const fd = document.getElementById('fDemo').value;
  const fp = document.getElementById('fPromo').value;
  return ROWS.filter(r => {
    if (fd && (r.demoAvailable||'') !== fd) return false;
    if (fp === 'Y' && !(r.promotion||'').trim()) return false;
    if (fp === 'N' && (r.promotion||'').trim()) return false;
    if (q) {
      const hay = [r.supplierName,r.managerName,r.products,r.promotion,r.discount,r.demoCondition,r.supplyLimit,r.remarks].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function render() {
  const list = applyFilters().slice().sort((a,b)=>(a.supplierName||'').localeCompare(b.supplierName||'','ko'));
  const tb = document.getElementById('tbody');
  document.getElementById('empty').style.display = ROWS.length ? 'none' : 'block';
  document.getElementById('countPill').textContent = list.length + '곳';
  const histCount = {};
  HISTORY.forEach(h => { const k=h['공급처id']; histCount[k]=(histCount[k]||0)+1; });
  tb.innerHTML = list.map(r => rowHtml(r, histCount[r.id]||0)).join('');
  updateDelBtn();
}

function rowHtml(r, histN) {
  const sel = selected.has(r.id);
  const dis = editorLocked() ? '' : ' disabled';
  const F = (f) => `onfocus="cellFocus('${r.id}','${f}',this)"`;
  const T = (f) => `${F(f)} oninput="edit('${r.id}','${f}',this.value)" onchange="cellCommit('${r.id}','${f}',this)"${dis}`;
  const S = (f) => `${F(f)} onchange="edit('${r.id}','${f}',this.value);cellCommit('${r.id}','${f}',this)"${dis}`;
  const demoV = r.demoAvailable ? ' v'+r.demoAvailable : '';
  const histBtn = `<button class="btn-hist${histN?'':' empty'}" onclick="openHist('${r.id}')">🕘${histN?' '+histN:''}</button>`;
  return `<tr data-id="${r.id}" class="${sel?'sel':''}">
    <td><input type="checkbox" ${sel?'checked':''} onclick="toggleSel('${r.id}',this)"${dis}></td>
    <td><input value="${esc(r.supplierName)}" ${T('supplierName')} class="cell name"></td>
    <td><select ${S('demoAvailable')} class="cell demo${demoV}">${optionsHtml(DEMO_OPTS, r.demoAvailable)}</select></td>
    <td><input value="${esc(r.demoCondition)}" ${T('demoCondition')} class="cell"></td>
    <td><input value="${esc(r.promotion)}" ${T('promotion')} class="cell"></td>
    <td><input value="${esc(r.discount)}" ${T('discount')} class="cell"></td>
    <td><input value="${esc(r.promoPeriod)}" ${T('promoPeriod')} class="cell"></td>
    <td><input value="${esc(r.managerName)}" ${T('managerName')} class="cell"></td>
    <td><input value="${esc(r.managerPhone)}" ${T('managerPhone')} class="cell"></td>
    <td><input value="${esc(r.managerEmail)}" ${T('managerEmail')} class="cell"></td>
    <td><input value="${esc(r.products)}" ${T('products')} class="cell"></td>
    <td><input value="${esc(r.supplyLimit)}" ${T('supplyLimit')} class="cell"></td>
    <td><input value="${esc(r.remarks)}" ${T('remarks')} class="cell"></td>
    <td class="col-hist">${histBtn}</td>
  </tr>`;
}

// ============================================================
// 변경이력 — 공급처별 팝업
// ============================================================
function chgText(h) {
  const f = (h['이전값']||'').trim() || '∅';
  const t = (h['새값']||'').trim() || '∅';
  return `<span class="chg-from">${esc(f)}</span> <span class="chg-arrow">→</span> <span class="chg-to">${esc(t)}</span>`;
}
function openHist(id) {
  const r = ROWS.find(x=>x.id===id);
  const list = HISTORY.filter(h => h['공급처id'] === id);
  document.getElementById('histTitle').textContent = (r ? r.supplierName : '') + ' 변경 이력';
  document.getElementById('histSub').textContent = list.length + '건';
  const el = document.getElementById('histList');
  el.innerHTML = list.length ? list.map(h => `<div class="hist-item">
    <div class="top">${esc(h['시각'])} · ${esc(h['작성자']||'(미지정)')}</div>
    <div><span class="field">${esc(h['필드'])}</span> &nbsp;${chgText(h)}</div></div>`).join('')
    : '<div class="empty" style="padding:24px 0">아직 변경 이력이 없습니다.</div>';
  openModal('histBg');
}

// ============================================================
// 편집 + 이력 기록
// ============================================================
let editDebounce = {};
function edit(id, field, value) {
  const r = ROWS.find(x => x.id === id); if (!r) return;
  r[field] = value; r.updatedAt = nowStamp();
  if (field === 'demoAvailable') render(); // 뱃지 색 즉시 반영
  clearTimeout(editDebounce[id]);
  editDebounce[id] = setTimeout(() => {
    syncUpdate(r).then(()=>flashSync()).catch(()=>toast('⚠ 저장 실패 — 새로고침 후 재시도'));
  }, 700);
}
let cellOrig = {};
function cellFocus(id, field, el) { cellOrig[id+'|'+field] = el.value; }
function cellCommit(id, field, el) {
  const key = id+'|'+field, orig = cellOrig[key], now = el.value;
  if (orig === undefined || orig === now) return;
  cellOrig[key] = now;
  logChange(id, field, orig, now);
}
function logChange(id, field, fromV, toV) {
  const r = ROWS.find(x => x.id === id);
  const editor = getEditor();
  const entry = { '시각': nowStamp(), '작성자': editor || '(미지정)', '공급처id': id, '공급처명': r ? r.supplierName : '', '필드': FIELD_TO_COL[field] || field, '이전값': fromV, '새값': toV };
  HISTORY.unshift(entry);
  render();
  callWebhook('log', { log: entry }).catch(()=>console.warn('이력 저장 실패'));
}

// ============================================================
// 선택 / 삭제
// ============================================================
function toggleSel(id, cb) {
  if (cb.checked) selected.add(id); else selected.delete(id);
  cb.closest('tr').classList.toggle('sel', cb.checked);
  updateDelBtn();
}
function toggleAll(cb) {
  applyFilters().forEach(r => { if (cb.checked) selected.add(r.id); else selected.delete(r.id); });
  render();
}
function updateDelBtn() {
  const n = selected.size;
  const b = document.getElementById('btnDel');
  b.disabled = n === 0; b.textContent = `선택 삭제 (${n})`;
  document.getElementById('chkAll').checked = applyFilters().length>0 && applyFilters().every(r=>selected.has(r.id));
}
function bulkDelete() {
  const ids = [...selected];
  if (!ids.length || !confirm(`${ids.length}곳을 삭제할까요? 시트에서도 영구 삭제됩니다.`)) return;
  ROWS = ROWS.filter(r => !selected.has(r.id));
  selected.clear(); render();
  (async () => {
    for (const id of ids) { try { await syncDelete(id); } catch(e){ console.warn('삭제 실패', id, e); } }
    flashSync(); toast('삭제 완료'); setTimeout(()=>refresh(false), 1200);
  })();
}

// ============================================================
// 등록
// ============================================================
function openManual() {
  if (!editorLocked()) { toast('작성자를 먼저 선택하세요'); return; }
  ['supplierName','demoAvailable','demoCondition','promotion','discount','promoPeriod','managerName','managerPhone','managerEmail','products','supplyLimit','remarks']
    .forEach(f => { const el=document.getElementById('m_'+f); if(el) el.value=''; });
  openModal('manualBg');
}
function saveManual() {
  const g = f => (document.getElementById('m_'+f).value||'').trim();
  const r = {
    id: genId(), createdAt: nowStamp(), updatedAt: '',
    supplierName: g('supplierName'), demoAvailable: g('demoAvailable'), demoCondition: g('demoCondition'),
    promotion: g('promotion'), discount: g('discount'), promoPeriod: g('promoPeriod'),
    managerName: g('managerName'), managerPhone: g('managerPhone'), managerEmail: g('managerEmail'),
    products: g('products'), supplyLimit: g('supplyLimit'), remarks: g('remarks')
  };
  if (!r.supplierName) { toast('공급처명은 입력하세요'); return; }
  const btn = document.getElementById('m_save'); btn.disabled = true;
  ROWS.unshift(r); render(); closeModal('manualBg');
  syncCreate(r).then(()=>{ flashSync(); toast('등록 완료'); }).catch(()=>toast('⚠ 등록 실패 — 새로고침 후 확인')).finally(()=>{ btn.disabled = false; });
  logChange(r.id, 'supplierName', '', r.supplierName);
}

// ============================================================
// 동기화 / 폴링 / UI
// ============================================================
function refresh(manual) {
  if (manual) document.getElementById('syncInfo').textContent = '새로고침 중…';
  return Promise.all([fetchSheet(), fetchHistory()]).then(([records]) => {
    const editingTr = document.activeElement && document.activeElement.closest ? document.activeElement.closest('tr') : null;
    const editingId = editingTr && editingTr.dataset ? editingTr.dataset.id : null;
    if (editingId) {
      const localEditing = ROWS.find(r=>r.id===editingId);
      ROWS = records.map(r => r.id===editingId && localEditing ? localEditing : r);
      if (localEditing && !records.some(r=>r.id===editingId)) ROWS.unshift(localEditing);
    } else { ROWS = records; }
    render();
    document.getElementById('syncInfo').textContent = '동기화: ' + new Date().toLocaleTimeString('ko-KR');
  }).catch(() => { document.getElementById('syncInfo').textContent = '⚠ 시트 조회 실패 (공유 설정 확인)'; });
}
function flashSync() { document.getElementById('syncInfo').textContent = '저장됨 · ' + new Date().toLocaleTimeString('ko-KR'); }
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    const anyModal = document.querySelector('.modal-bg.open');
    const editing = document.activeElement && (document.activeElement.tagName==='INPUT' || document.activeElement.tagName==='SELECT' || document.activeElement.tagName==='TEXTAREA');
    if (!anyModal && !editing) refresh(false);
  }, 30000);
}
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(bg => bg.addEventListener('click', e => { if (e.target===bg) bg.classList.remove('open'); }));
document.addEventListener('keydown', e => { if (e.key==='Escape') document.querySelectorAll('.modal-bg.open').forEach(m=>m.classList.remove('open')); });

let toastTimer=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }

// init
initEditorSel();
refresh(true).then(startPolling);
</script>
</body>
